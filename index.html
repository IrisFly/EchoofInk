<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DeepSeek Chat</title>

<style>
body{margin:0;font-family:-apple-system;background:#0f1115;color:#fff}
body.light{background:#f5f7fa;color:#111}

#app{display:flex;height:100vh}

/* 侧边栏 */
#sidebar{
  width:240px;background:#1a1f2b;
  display:flex;flex-direction:column;padding:10px;gap:8px
}

#chatList{flex:1;overflow:auto}
#chatList div{
  padding:8px;border-radius:8px;background:#2a3142;margin-bottom:6px
}

/* 主区 */
main{flex:1;display:flex;flex-direction:column}
header{display:flex;justify-content:space-between;padding:10px}
#messages{flex:1;overflow:auto;padding:10px}
.message{padding:10px;border-radius:16px;margin:6px 0;max-width:75%}
.user{background:#4f8cff;margin-left:auto}
.ds{background:#2a3142}

footer{display:flex;padding:10px;gap:6px}
textarea{flex:1;border-radius:10px;padding:8px}
button{border:none;border-radius:8px;padding:8px}

/* 手机适配 */
@media(max-width:768px){
  #app{flex-direction:column}
  #sidebar{width:100%;flex-direction:row;overflow:auto}
}
</style>
</head>

<body>
<div id="app">

<aside id="sidebar">
<button onclick="newChat()">+新对话</button>

<select id="role">
<option value="温柔恋人">温柔恋人</option>
<option value="高冷">高冷</option>
<option value="撩人">撩人</option>
</select>

<select id="model">
<option value="deepseek-chat">chat</option>
<option value="deepseek-coder">coder</option>
</select>

<button onclick="toggleTheme()">🌙</button>

<div id="chatList"></div>

<button onclick="deleteChat()">删除对话</button>
</aside>

<main>
<header>
<button onclick="regen()">重新生成</button>
<button onclick="stop()">停止</button>
</header>

<div id="messages"></div>

<footer>
<textarea id="input"></textarea>
<button onclick="send()">发送</button>
</footer>

</main>
</div>

<script>
const WORKER_URL="https://story.3613530694.workers.dev/";

let chats=JSON.parse(localStorage.getItem("chats")||"[]");
let current=null;
let controller=null;
let MAX_MEMORY=10;

function save(){localStorage.setItem("chats",JSON.stringify(chats))}

function newChat(){
let c={id:Date.now(),messages:[],system:"你是"+role.value};
chats.push(c);current=c;save();renderChats();render()
}

function deleteChat(){
chats=chats.filter(c=>c!==current);
current=chats[0];save();renderChats();render()
}

function renderChats(){
chatList.innerHTML="";
chats.forEach(c=>{
let d=document.createElement("div");
d.innerText=c.system;
d.onclick=()=>{current=c;render()}
chatList.appendChild(d)
})
}

function render(){
messages.innerHTML="";
current.messages.forEach((m,i)=>{
let d=document.createElement("div");
d.className="message "+(m.role=="user"?"user":"ds");
d.innerText=m.content;

d.oncontextmenu=e=>{
e.preventDefault();
let a=prompt("1编辑 2删除 3回溯");
if(a==1){edit(i)}
if(a==2){current.messages.splice(i,1);render()}
if(a==3){current.messages=current.messages.slice(0,i+1);render()}
}

messages.appendChild(d)
})
messages.scrollTop=99999
}

function edit(i){
let t=prompt("编辑",current.messages[i].content);
if(t){current.messages[i].content=t;render()}
}

function toggleTheme(){
document.body.classList.toggle("light")
}

function stop(){if(controller)controller.abort()}

function regen(){
current.messages.pop();
fetchDS()
}

async function send(){
let text=input.value.trim();
if(!text)return;
input.value="";
current.messages.push({role:"user",content:text});
current.messages=current.messages.slice(-MAX_MEMORY);
render();
fetchDS();
}

async function fetchDS(){
controller=new AbortController();

let res=await fetch(WORKER_URL,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
model:model.value,
messages:[
{role:"system",content:current.system},
...current.messages
]
}),
signal:controller.signal
});

let data=await res.json();

current.messages.push({
role:"assistant",
content:data.choices?.[0]?.message?.content||"error"
});

render();save()
}

window.onload=()=>{
if(!chats.length)newChat();
else current=chats[0];
renderChats();render()
}
</script>
</body>
</html>
