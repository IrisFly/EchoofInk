<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat</title>

<style>
body{
  margin:0;
  font-family:-apple-system;
  background:#0f1115;
  color:#fff;
}

#app{
  display:flex;
  flex-direction:column;
  height:100vh;
}

/* 聊天区 */
#messages{
  flex:1;
  overflow-y:auto;
  padding:12px;
}

/* 气泡 */
.msg{
  max-width:80%;
  padding:10px 14px;
  margin:6px 0;
  border-radius:16px;
  line-height:1.4;
}

.user{
  background:#0a84ff;
  margin-left:auto;
}

.ai{
  background:#2c2c2e;
}

/* 输入区 */
footer{
  display:flex;
  gap:8px;
  padding:10px;
  border-top:1px solid #222;
}

textarea{
  flex:1;
  border-radius:12px;
  padding:8px;
  font-size:16px;
  resize:none;
}

button{
  background:#0a84ff;
  color:#fff;
  border:none;
  border-radius:10px;
  padding:10px 14px;
}
</style>
</head>

<body>
<div id="app">

<div id="messages"></div>

<footer>
<textarea id="input" placeholder="说点什么..."></textarea>
<button id="send">发送</button>
</footer>

</div>

<script>
// 👇 改成你的 Worker 地址
const WORKER_URL = "https://story.3613530694.workers.dev/";

const input = document.getElementById("input");
const messages = document.getElementById("messages");

let history = [];

function addMsg(text, cls){
  const div = document.createElement("div");
  div.className = "msg " + cls;
  div.textContent = text;
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

async function send(){
  const text = input.value.trim();
  if(!text) return;

  addMsg(text,"user");
  history.push({role:"user",content:text});
  input.value="";

  try{
    const res = await fetch(WORKER_URL,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        model:"deepseek-chat",
        messages:history
      })
    });

    const data = await res.json();
    const reply = data.choices?.[0]?.message?.content || "出错了";

    addMsg(reply,"ai");
    history.push({role:"assistant",content:reply});

  }catch(e){
    addMsg("请求失败","ai");
  }
}

document.getElementById("send").onclick = send;

input.addEventListener("keydown",e=>{
  if(e.key==="Enter"&&!e.shiftKey){
    e.preventDefault();
    send();
  }
});
</script>

</body>
</html>
